    <div id="app" data-page='{&quot;component&quot;:&quot;Home&quot;,&quot;props&quot;:{&quot;locale&quot;:&quot;zh-TW&quot;,&quot;t&quot;:{&quot;nav&quot;:{&quot;features&quot;:&quot;核心功能&quot;,&quot;integration&quot;:&quot;整合&quot;,&quot;docs&quot;:&quot;文件&quot;,&quot;about&quot;:&quot;關於&quot;},&quot;hero&quot;:{&quot;status&quot;:&quot;系統運行中&quot;,&quot;title&quot;:&quot;控制平面，適用於&quot;,&quot;titleHighlight&quot;:&quot;Flux &amp; Stream&quot;,&quot;description&quot;:&quot;Gravito Flux &amp; Stream 的零配置控制平面。即時監控、隊列管理、任務審計和自動化警報—無需任何配置檔案。&quot;,&quot;getStarted&quot;:&quot;開始使用&quot;,&quot;documentation&quot;:&quot;文件&quot;},&quot;features&quot;:{&quot;title&quot;:&quot;管理隊列所需的一切功能&quot;,&quot;subtitle&quot;:&quot;為現代異步基礎架構打造的全面監控和管理工具&quot;,&quot;realtimeMonitoring&quot;:{&quot;title&quot;:&quot;即時監控&quot;,&quot;description&quot;:&quot;以毫秒級精度追蹤任務吞吐量和錯誤率。透過即時指標和即時更新監控系統健康狀態。&quot;},&quot;queueManagement&quot;:{&quot;title&quot;:&quot;隊列管理&quot;,&quot;description&quot;:&quot;輕鬆暫停、恢復和檢查隊列。使用詳細的分頁和過濾功能查看等待、延遲和失敗的任務。&quot;},&quot;jobAuditing&quot;:{&quot;title&quot;:&quot;任務審計與搜索&quot;,&quot;description&quot;:&quot;透過 SQL 永久歷史記錄和全局搜索。同時查詢 Redis（即時）和 SQL（歸檔）以獲得完整可見性。&quot;},&quot;dlqOperations&quot;:{&quot;title&quot;:&quot;死信隊列操作&quot;,&quot;description&quot;:&quot;直接從 UI 批量重試或清除失敗的任務。檢查堆疊追蹤並一鍵重放特定事件。&quot;},&quot;automatedAlerting&quot;:{&quot;title&quot;:&quot;自動化警報&quot;,&quot;description&quot;:&quot;針對失敗激增或積壓問題的 Slack 通知。即時檢查並具有冷卻邏輯以防止警報疲勞。&quot;},&quot;scheduleManagement&quot;:{&quot;title&quot;:&quot;排程管理&quot;,&quot;description&quot;:&quot;Cron 任務的完整 UI。輕鬆管理排程任務、查看執行歷史並配置重複操作。&quot;}},&quot;integration&quot;:{&quot;title&quot;:&quot;零配置部署&quot;,&quot;description&quot;:&quot;Zenith 會自動發現您的 Flux 隊列和 Stream 主題。內建 SQLite 支援意味著本地審計無需資料庫伺服器。只需連接到 Redis 即可開始使用。&quot;,&quot;features&quot;:{&quot;autoDiscovery&quot;:&quot;自動發現隊列和主題&quot;,&quot;sqliteSupport&quot;:&quot;內建 SQLite 支援用於本地審計&quot;,&quot;workerHealth&quot;:&quot;Worker 健康監控，包含即時 CPU 和 RAM 指標&quot;,&quot;logArchiving&quot;:&quot;操作日誌歸檔與歷史搜索&quot;,&quot;batchActions&quot;:&quot;批量操作：清除延遲任務、清空隊列、批量操作&quot;,&quot;hybridSearch&quot;:&quot;跨 Redis（即時）和 SQL（歸檔）的混合搜索&quot;}},&quot;about&quot;:{&quot;title&quot;:&quot;關於&quot;,&quot;titleHighlight&quot;:&quot;Zenith&quot;,&quot;whatIs&quot;:&quot;什麼是 Zenith？&quot;,&quot;whatIsDescription1&quot;:&quot;Gravito Zenith 是一部專為極致性能打造的控制平面。它不僅是 Gravito 生態系的指揮中心，更是現代異步架構的監視者—在毫秒之間，洞察系統的每一次心跳。&quot;,&quot;whatIsDescription2&quot;:&quot;我們拒絕複雜的配置與沉重的代碼侵入。Zenith 採用自用優先（dogfooding）原則，深度整合 @gravito/photon 與 @gravito/stream，為您提供最直覺、最硬核的開發體驗。&quot;,&quot;story&quot;:{&quot;title&quot;:&quot;源起：從痛苦中誕生的精準控制&quot;,&quot;content&quot;:&quot;在管理大規模分佈式系統時，開發者往往面臨兩難：要麼忍受監控工具的高延遲，要麼妥協於數據的淺顯。Laravel Horizon 建立了標準，但當面臨跨語言整合與海量審計需求時，界限便顯露無疑。Zenith 的誕生，是為了徹底打破這些極限。&quot;},&quot;philosophy&quot;:{&quot;title&quot;:&quot;願景：無干擾的內省 (Introspection)&quot;,&quot;content&quot;:&quot;我們認為監控工具不應成為系統的核心負擔。透過 Gravito Pulse 協議，我們實踐了「無干擾的內省」—讓您的代碼保持純粹，同時賦予您如同上帝視角般的全局掌控力。&quot;},&quot;roadmap&quot;:{&quot;title&quot;:&quot;藍圖：從隊列解析到全系統編排&quot;,&quot;content&quot;:&quot;現在的 Zenith 是頂尖的隊列控制中心。未來，我們將引入跨雲節點的自動化擴展、AI 異常偵測診斷，以及致力於成為跨語言微服務架構的終極控制平面。&quot;},&quot;coreFeatures&quot;:&quot;核心功能&quot;,&quot;technicalSpecs&quot;:&quot;技術架構&quot;,&quot;backend&quot;:&quot;後端驅動 (Photon)&quot;,&quot;frontend&quot;:&quot;前端介面 (React)&quot;,&quot;deployment&quot;:&quot;部署哲學&quot;,&quot;additionalCapabilities&quot;:&quot;深層功能&quot;,&quot;dlqOperations&quot;:&quot;死信隊列操作：&quot;,&quot;dlqOperationsDesc&quot;:&quot;直接從 UI 批量重試或清除失敗的任務&quot;,&quot;logArchiving&quot;:&quot;操作日誌歸檔：&quot;,&quot;logArchivingDesc&quot;:&quot;系統事件和 Worker 活動的持久化儲存，包含歷史搜索&quot;,&quot;batchActions&quot;:&quot;批量操作：&quot;,&quot;batchActionsDesc&quot;:&quot;清除延遲任務、清空隊列和批量操作&quot;,&quot;retentionManagement&quot;:&quot;保留管理：&quot;,&quot;retentionManagementDesc&quot;:&quot;可配置的歷史資料自動清理&quot;,&quot;backToHome&quot;:&quot;← 返回巔峰 v1.1.0&quot;},&quot;features_deep&quot;:{&quot;title&quot;:&quot;可觀測性的&quot;,&quot;titleHighlight&quot;:&quot;核心架構&quot;,&quot;subtitle&quot;:&quot;深度解析驅動下一代關鍵任務監控的底層架構。&quot;,&quot;persistence&quot;:{&quot;title&quot;:&quot;混合持久化策略&quot;,&quot;description&quot;:&quot;為什麼要在即時性與歷史記錄之間做選擇？Zenith 採用雙引擎機制，確保每一筆遙測數據都被精準捕獲。&quot;,&quot;redis&quot;:{&quot;title&quot;:&quot;瞬時引擎 (Redis)&quot;,&quot;content&quot;:&quot;捕捉系統的最原始數據。毫秒級追蹤隊列深度、Worker 狀態與總吞吐量。無需承受磁碟延遲，僅有極致的內存性能。&quot;},&quot;sql&quot;:{&quot;title&quot;:&quot;審計引擎 (SQLite/MySQL)&quot;,&quot;content&quot;:&quot;Zenith 會自動將已完成與失敗的任務數據轉存至 SQL 持久層。這提供了永久、可搜索的審計追蹤，即使 Redis 重啟或內存清理，數據依然穩如磐石。&quot;}},&quot;protocol&quot;:{&quot;title&quot;:&quot;Gravito Pulse 協議 (GPP)&quot;,&quot;description&quot;:&quot;GPP 是我們為大規模場景與無干擾設計的輕量級遙測協議。&quot;,&quot;feature1&quot;:{&quot;title&quot;:&quot;容錯性傳輸&quot;,&quot;content&quot;:&quot;針對高流量傳輸優化，適用於精度與性能皆不可妥協的場景。&quot;},&quot;feature2&quot;:{&quot;title&quot;:&quot;原生跨語言支援&quot;,&quot;content&quot;:&quot;原生支援 PHP, Go 與 Node.js。讓您的微服務體系使用同一種語言對接 Zenith 控制中心。&quot;},&quot;feature3&quot;:{&quot;title&quot;:&quot;零配置服務發現&quot;,&quot;content&quot;:&quot;透過 Redis 模式匹配實現自動服務發現。告別繁瑣的手動端點映射。&quot;}},&quot;performance&quot;:{&quot;title&quot;:&quot;頂尖效能基準&quot;,&quot;latency&quot;:&quot;每筆任務彙報延遲低於 0.1ms&quot;,&quot;throughput&quot;:&quot;標準硬體下可支持每秒 50,000 次操作&quot;,&quot;reliability&quot;:&quot;生產環境負載下具備 99.99% 可靠性&quot;}},&quot;integrations&quot;:{&quot;title&quot;:&quot;星際&quot;,&quot;titleHighlight&quot;:&quot;技術共鳴&quot;,&quot;subtitle&quot;:&quot;Zenith 橫跨不同技術棧、語言與基礎設施，實現全域數據同步。&quot;,&quot;core&quot;:{&quot;title&quot;:&quot;控制平面核心&quot;,&quot;description&quot;:&quot;以您的方式部署中央儀表板。將其作為獨立微服務運行，或直接嵌入您現有的基礎架構中。&quot;,&quot;docker_feature&quot;:&quot;生產級 Docker 映像檔&quot;,&quot;node_feature&quot;:&quot;Express/Gravito 中間件&quot;,&quot;db_feature&quot;:&quot;支援 MySQL/PostgreSQL/SQLite&quot;},&quot;laravel&quot;:{&quot;title&quot;:&quot;Laravel Zenith&quot;,&quot;description&quot;:&quot;原生應用內 (In-App) 回報器。深度整合至 Laravel，精確捕捉日誌、HTTP 指標與隊列事件。&quot;,&quot;feature1&quot;:&quot;應用內事件即時回報&quot;,&quot;feature2&quot;:&quot;即時日誌串流&quot;,&quot;feature3&quot;:&quot;原生 Artisan 指令整合&quot;},&quot;quasar_lib&quot;:{&quot;title&quot;:&quot;Quasar (Node/Bun)&quot;,&quot;description&quot;:&quot;適用於 Node.js、Bun 與 Deno 的通用運行時庫。直接嵌入 Worker 代碼，實現細粒度的任務追蹤。&quot;,&quot;feature1&quot;:&quot;細粒度任務生命週期追蹤&quot;,&quot;feature2&quot;:&quot;零開銷的橋接架構&quot;,&quot;feature3&quot;:&quot;支援 BullMQ 與 Bee-Queue&quot;},&quot;quasar_go&quot;:{&quot;title&quot;:&quot;Quasar-Go 代理&quot;,&quot;description&quot;:&quot;獨立二進制代理程式。部署於任何主機，無需修改代碼即可監控系統資源與外部隊列。&quot;,&quot;feature1&quot;:&quot;零依賴單一二進制檔&quot;,&quot;feature2&quot;:&quot;系統級指標監控 (CPU/RAM)&quot;,&quot;feature3&quot;:&quot;具備遠端控制能力&quot;},&quot;astral&quot;:{&quot;title&quot;:&quot;Astral OpenAPI&quot;,&quot;description&quot;:&quot;影子契約文檔引擎。在不向代碼添加任何裝飾器的情況下，生成 OpenAPI 規格與 Swagger UI。&quot;,&quot;feature1&quot;:&quot;影子契約 (Shadow-Contract) 架構&quot;,&quot;feature2&quot;:&quot;無代碼污染設計&quot;,&quot;feature3&quot;:&quot;自動 DTO 類型推斷&quot;},&quot;ecosystem&quot;:{&quot;title&quot;:&quot;生態體系&quot;,&quot;redis&quot;:&quot;Redis 6.0+ 分片/集群支援&quot;,&quot;sql&quot;:&quot;MySQL/PostgreSQL/SQLite 持久化審計&quot;,&quot;cloud&quot;:&quot;原生的 Docker &amp; K8s 部署模式&quot;}},&quot;footer&quot;:{&quot;copyright&quot;:&quot;© 2026 Gravito. 版權所有。&quot;,&quot;privacy&quot;:&quot;隱私政策&quot;,&quot;terms&quot;:&quot;服務條款&quot;,&quot;contact&quot;:&quot;聯絡我們&quot;},&quot;privacy&quot;:{&quot;title&quot;:&quot;隱私政策&quot;,&quot;lastUpdated&quot;:&quot;最後更新：2026年1月&quot;,&quot;section1&quot;:{&quot;title&quot;:&quot;數據哲學&quot;,&quot;content&quot;:&quot;在 Gravito，我們深信數據屬於您。Zenith 的設計初衷是為了「內省 (Introspection)」，而非「提取 (Extraction)」。我們絕不向任何第三方出售、交易或共享您的應用程序指標—您的系統心跳將永遠留在您的星系中。&quot;},&quot;section2&quot;:{&quot;title&quot;:&quot;我們收集的數據&quot;,&quot;content&quot;:&quot;我們僅收集匿名使用數據以改善平台體驗，這包括 Zenith 控制面板內的導航模式和功能使用情況。除您的本地環境外，我們不會訪問您的 Redis 或 SQL 數據存儲內容。&quot;},&quot;section3&quot;:{&quot;title&quot;:&quot;Cookie 與分析&quot;,&quot;content&quot;:&quot;我們使用最少量的 Cookie 進行會話管理和基礎性能分析（例如 Vercel Analytics），以確保 Web 服務的穩定性。&quot;}},&quot;terms&quot;:{&quot;title&quot;:&quot;服務條款&quot;,&quot;lastUpdated&quot;:&quot;最後更新：2026年1月&quot;,&quot;section1&quot;:{&quot;title&quot;:&quot;軟體使用&quot;,&quot;content&quot;:&quot;Zenith 是根據 MIT 許可證提供的開源工具。雖然我們致力於極致的可靠性，但軟體是「按原樣 (As-Is)」提供的，不提供任何形式的保證。&quot;},&quot;section2&quot;:{&quot;title&quot;:&quot;用戶責任&quot;,&quot;content&quot;:&quot;用戶需自行負責其 Redis 與 SQL 實例的安全。對於因配置錯誤或不當使用 Zenith 控制平面而導致的數據丟失或服務中斷，Gravito 不承擔任何責任。&quot;},&quot;section3&quot;:{&quot;title&quot;:&quot;合規使用&quot;,&quot;content&quot;:&quot;Zenith 旨在用於系統監控和合法的開發用途。嚴禁將其用於任何惡意活動或未經授權的監視行為。&quot;}},&quot;contact&quot;:{&quot;title&quot;:&quot;聯絡我們&quot;,&quot;subtitle&quot;:&quot;與架構師連線&quot;,&quot;description&quot;:&quot;有關於整合、定製解決方案的問題，或者只是想打個招呼？我們的團隊隨時待命。&quot;,&quot;email&quot;:&quot;hello@gravito.dev&quot;,&quot;socials&quot;:{&quot;github&quot;:&quot;GitHub 社群&quot;,&quot;twitter&quot;:&quot;追蹤我們的旅程&quot;,&quot;discord&quot;:&quot;加入 Discord&quot;}}},&quot;version&quot;:&quot;1.1.3&quot;},&quot;url&quot;:&quot;/zh-TW&quot;,&quot;version&quot;:&quot;1.1.3&quot;}'></div>
